<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MSN League — Leaderboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ════════════════════════════════════════════════════════════
     HEADER
     ════════════════════════════════════════════════════════════ -->
<header class="site-header">
  <div class="header-noise"></div>
  <div class="header-shine"></div>
  
  <svg class="header-corner left" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <path d="M10,10 L50,10 L50,50 L10,50 Z M20,20 L40,20 L40,40 L20,40 Z" fill="none" stroke="white" stroke-width="2"/>
  </svg>
  
  <svg class="header-corner right" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <circle cx="50" cy="50" r="35" fill="none" stroke="white" stroke-width="2"/>
    <circle cx="50" cy="50" r="20" fill="none" stroke="white" stroke-width="2"/>
  </svg>

  <div class="header-inner">
    <div class="header-eyebrow">Welcome to</div>
    <h1 class="header-title">MSN <span>LEAGUE</span></h1>
    <div class="header-subtitle">Real-Time Leaderboard</div>
    <div class="header-divider"></div>
  </div>
</header>

<!-- ════════════════════════════════════════════════════════════
     TOOLBAR
     ════════════════════════════════════════════════════════════ -->
<nav class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"></circle>
        <path d="m21 21-4.35-4.35"></path>
      </svg>
      <input 
        type="text" 
        class="search-input" 
        id="searchInput" 
        placeholder="Search players..."
      >
    </div>
    <button class="toolbar-btn" id="filterBtn">Filter</button>
    <button class="toolbar-btn" id="sortBtn">Sort</button>
    <button class="toolbar-btn" id="refreshBtn">Refresh</button>
  </div>
</nav>

<!-- ════════════════════════════════════════════════════════════
     MAIN CONTENT
     ════════════════════════════════════════════════════════════ -->
<main class="site-main">
  <div class="section-label">
    <span>Leaderboard Stats</span>
  </div>

  <div class="leaderboard-grid" id="leaderboardGrid">
    <!-- Stat cards will be dynamically generated here -->
  </div>
</main>

<!-- ════════════════════════════════════════════════════════════
     FOOTER
     ════════════════════════════════════════════════════════════ -->
<footer class="site-footer">
  MSN League © 2026 — Real-Time Gaming Statistics
</footer>

<script src="app.js"></script>
</body>
</html>
